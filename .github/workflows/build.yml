name: Build & Test

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Uses latest stable Go version

      - name: Run unit tests
        run: go test -v -race ./...

  build:
    name: Build Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Compile Binary
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          mkdir -p dist
          
          TAG_VERSION="${{ github.ref_name }}"
          if [[ ! "$TAG_VERSION" =~ ^v ]]; then
            TAG_VERSION="v0.0.0-dev"
          fi
          COMMIT_SHA="${{ github.sha }}"
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          LDFLAGS="-X github.com/guppshub/cx-cli/cmd.Version=${TAG_VERSION} -X github.com/guppshub/cx-cli/cmd.CommitSHA=${COMMIT_SHA:0:7} -X github.com/guppshub/cx-cli/cmd.BuildTime=${BUILD_TIME}"
          
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$LDFLAGS" -o dist/cx-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cx-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
